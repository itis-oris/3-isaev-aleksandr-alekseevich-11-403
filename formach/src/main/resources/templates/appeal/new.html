<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Оспорить бан')}"></head>
<body>
<div th:replace="~{fragments/layout :: header}"></div>

<main class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-5">
            <h1 class="h4 mb-3">Оспорить блокировку</h1>
            <p class="text-muted small">
                Если вы считаете, что вас заблокировали несправедливо — напишите свою сторону.
                Администратор рассмотрит обращение.
            </p>

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form th:action="@{/appeal}" method="post" class="card shadow-sm p-3">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="mb-3">
                    <label class="form-label">Ваш логин</label>
                    <input type="text" name="login" class="form-control"
                           th:value="${login}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email для связи (необязательно)</label>
                    <input type="email" name="email" class="form-control"
                           th:value="${email}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Сообщение администрации</label>
                    <textarea name="message" rows="6" class="form-control"
                              th:text="${message}"
                              placeholder="Опишите ситуацию..." required></textarea>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Отправить</button>
                    <a th:href="@{/login}" class="btn btn-outline-secondary">Назад</a>
                </div>
            </form>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
