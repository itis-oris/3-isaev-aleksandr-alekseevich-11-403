<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Темы @' + ${targetUser.login})}"></head>
<body>
<div th:replace="~{fragments/layout :: header}"></div>

<main class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <a th:href="@{/users/{id}(id=${targetUser.id})}"
               class="btn btn-outline-secondary btn-sm mb-3">← К профилю</a>

            <h1 class="h4 mb-3">
                Темы пользователя
                <a th:href="@{/users/{id}(id=${targetUser.id})}"
                   th:text="'@' + ${targetUser.login}"
                   class="text-decoration-none"></a>
            </h1>

            <p th:if="${topics.totalElements == 0}" class="text-muted py-4 text-center">
                Этот пользователь не создал ни одной темы.
            </p>

            <div th:each="topic : ${topics.content}" class="card mb-2 shadow-sm"
                 th:classappend="${topic.pinnedByAdmin} ? 'border-warning' : ''">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start gap-3">
                        <div>
                            <span th:if="${topic.pinnedByAdmin}" class="badge bg-warning text-dark me-1">📌</span>
                            <a th:href="@{/topics/{id}(id=${topic.id})}"
                               th:text="${topic.title}"
                               class="text-decoration-none text-dark fw-semibold"></a>
                            <div class="small text-muted mt-1">
                                <span th:text="${#temporals.format(topic.createdAt, 'dd.MM.yyyy HH:mm')}"></span>
                                ·
                                <span th:text="${topic.postCount}">0</span> ответов
                                ·
                                <span th:text="${topic.viewCount}">0</span> просмотров
                                <span th:if="${topic.isClosed}" class="badge bg-secondary ms-1">закрыто</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <nav th:if="${topics.totalPages > 1}" aria-label="Пагинация" class="mt-3">
                <ul class="pagination justify-content-center">
                    <li th:each="i : ${#numbers.sequence(0, topics.totalPages - 1)}"
                        class="page-item" th:classappend="${i == topics.number} ? 'active'">
                        <a class="page-link"
                           th:href="@{/users/{id}/topics(id=${targetUser.id}, page=${i})}"
                           th:text="${i + 1}"></a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
