<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${title})}"></head>
<body>
<div th:replace="~{fragments/layout :: header}"></div>

<main class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <a th:href="@{/users/{id}(id=${targetUser.id})}"
               class="btn btn-outline-secondary btn-sm mb-3">← К профилю</a>

            <h1 class="h4 mb-3" th:text="${title}">Список</h1>

            <p th:if="${#lists.isEmpty(users)}" class="text-muted py-4 text-center"
               th:text="${emptyText}"></p>

            <div class="list-group">
                <a th:each="u : ${users}"
                   th:href="@{/users/{id}(id=${u.id})}"
                   class="list-group-item list-group-item-action d-flex align-items-center gap-3">
                    <img th:if="${u.avatarPath != null}" th:src="${u.avatarPath}"
                         alt="avatar" class="rounded-circle flex-shrink-0"
                         style="width:40px;height:40px;object-fit:cover;">
                    <div th:if="${u.avatarPath == null}"
                         class="bg-secondary text-white rounded-circle d-flex align-items-center justify-content-center flex-shrink-0"
                         style="width:40px;height:40px;font-size:1rem;">
                        <span th:text="${#strings.substring(u.firstName,0,1)}">?</span>
                    </div>
                    <div class="flex-grow-1">
                        <div class="fw-semibold" th:text="${u.firstName + ' ' + u.lastName}"></div>
                        <small class="text-muted">@<span th:text="${u.login}"></span></small>
                    </div>
                </a>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
