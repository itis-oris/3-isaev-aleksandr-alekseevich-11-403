<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Пользователи')}"></head>
<body>
<div th:replace="~{fragments/layout :: header}"></div>

<main class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <h1 class="h3 mb-3">Пользователи</h1>

            <form method="get" th:action="@{/users}" class="d-flex gap-2 mb-4">
                <input type="text" name="search" class="form-control" th:value="${search}"
                       placeholder="Поиск по логину, имени или email...">
                <button type="submit" class="btn btn-primary">Найти</button>
                <a th:href="@{/users}" class="btn btn-outline-secondary">Сброс</a>
            </form>

            <p th:if="${users.totalElements == 0}" class="text-muted text-center py-4">
                Ничего не найдено.
            </p>

            <div class="list-group">
                <a th:each="u : ${users.content}"
                   th:href="@{/users/{id}(id=${u.id})}"
                   class="list-group-item list-group-item-action d-flex align-items-center gap-3">
                    <img th:if="${u.avatarPath != null}" th:src="${u.avatarPath}"
                         alt="avatar" class="rounded-circle flex-shrink-0"
                         style="width:40px;height:40px;object-fit:cover;">
                    <div th:if="${u.avatarPath == null}"
                         class="bg-secondary text-white rounded-circle d-flex align-items-center justify-content-center flex-shrink-0"
                         style="width:40px;height:40px;font-size:1rem;">
                        <span th:text="${#strings.substring(u.firstName,0,1)}">?</span>
                    </div>
                    <div class="flex-grow-1">
                        <div class="fw-semibold" th:text="${u.firstName + ' ' + u.lastName}"></div>
                        <small class="text-muted">@<span th:text="${u.login}"></span></small>
                    </div>
                    <span th:if="${u.isBanned}" class="badge bg-warning text-dark">Заблокирован</span>
                    <span th:if="${u.role != null and u.role.name() == 'ADMIN'}"
                          class="badge bg-danger">ADMIN</span>
                </a>
            </div>

            <nav th:if="${users.totalPages > 1}" aria-label="Пагинация" class="mt-3">
                <ul class="pagination justify-content-center">
                    <li th:each="i : ${#numbers.sequence(0, users.totalPages - 1)}"
                        class="page-item" th:classappend="${i == users.number} ? 'active'">
                        <a class="page-link"
                           th:href="@{/users(search=${search},page=${i})}"
                           th:text="${i + 1}"></a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
