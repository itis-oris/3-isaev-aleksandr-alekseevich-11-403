<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Сообщения')}"></head>
<body>
<div th:replace="~{fragments/layout :: header}"></div>

<main class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <h1 class="h3 mb-4">Входящие сообщения</h1>

            <div th:if="${#lists.isEmpty(interlocutors)}" class="text-center text-muted py-5">
                <p>Сообщений пока нет.</p>
                <a th:href="@{/topics}" class="btn btn-outline-primary btn-sm">К форуму</a>
            </div>

            <div class="list-group">
                <a th:each="u : ${interlocutors}"
                   th:href="@{/messages/{id}(id=${u.id})}"
                   class="list-group-item list-group-item-action d-flex align-items-center gap-3">
                    <div class="bg-secondary text-white rounded-circle d-flex align-items-center justify-content-center flex-shrink-0"
                         style="width:40px;height:40px;font-size:1rem;">
                        <span th:text="${#strings.substring(u.firstName,0,1)}">?</span>
                    </div>
                    <div>
                        <div class="fw-semibold" th:text="${u.firstName + ' ' + u.lastName}"></div>
                        <small class="text-muted">@<span th:text="${u.login}"></span></small>
                    </div>
                </a>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
