<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Жалоба')}"></head>
<body>
<div th:replace="~{fragments/layout :: header}"></div>

<main class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-5">
            <h1 class="h4 mb-3">Пожаловаться</h1>

            <form th:action="@{/complaints}" th:object="${complaintRequest}"
                  method="post" enctype="multipart/form-data" class="card shadow-sm p-3">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" th:field="*{postId}">
                <input type="hidden" th:field="*{topicId}">
                <input type="hidden" th:field="*{reportedUserId}">

                <div class="mb-3">
                    <label class="form-label">Причина жалобы</label>
                    <textarea th:field="*{reason}" rows="5" class="form-control"
                              th:classappend="${#fields.hasErrors('reason')} ? 'is-invalid'"
                              placeholder="Опишите, что не так..."></textarea>
                    <div class="invalid-feedback"
                         th:if="${#fields.hasErrors('reason')}" th:errors="*{reason}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Пруфы (картинки или файлы — можно несколько)</label>
                    <input type="file" class="form-control" multiple
                           name="proofs" accept="image/*,video/*,.pdf,.txt,.zip">
                    <div class="form-text">До 50 МБ каждый. Помогает админам понять контекст.</div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-danger">Отправить</button>
                    <a th:href="@{/topics}" class="btn btn-outline-secondary">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
