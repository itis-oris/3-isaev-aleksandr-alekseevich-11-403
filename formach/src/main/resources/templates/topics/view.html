<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${topic.title})}"></head>
<body>
<div th:replace="~{fragments/layout :: header}"></div>

<main class="container py-4">
    <div class="row">
        <div class="col-lg-9">

            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <div class="d-flex align-items-start justify-content-between gap-3">
                        <div>
                            <h1 class="h3 mb-2" th:text="${topic.title}"></h1>
                            <div class="mb-2">
                                <span th:if="${topic.type.name() == 'QUESTION'}"
                                      class="badge bg-info text-dark me-1">Вопрос</span>
                                <span th:if="${topic.type.name() == 'INFO'}"
                                      class="badge bg-secondary me-1">Информация</span>
                                <span th:if="${topic.isClosed}"
                                      class="badge bg-danger me-1">Закрыта</span>
                                <span th:each="tag : ${topic.tags}"
                                      class="badge bg-light text-dark border me-1"
                                      th:text="${tag}"></span>
                            </div>
                            <small class="text-muted">
                                Автор:
                                <a th:href="@{/users/{id}(id=${topic.authorId})}"
                                   th:text="${topic.authorLogin}"
                                   class="text-muted fw-semibold text-decoration-none"></a>
                                &nbsp;&middot;&nbsp;
                                <span th:text="${#temporals.format(topic.createdAt, 'dd.MM.yyyy HH:mm')}"></span>
                                &nbsp;&middot;&nbsp;
                                <span th:text="${topic.viewCount}"></span> просм.
                            </small>
                        </div>
                    </div>

                    <hr>
                    <div class="mb-3" th:text="${topic.description}"></div>

                    <div th:if="${topic.attachments != null and !topic.attachments.isEmpty()}"
                         class="d-flex flex-wrap gap-2 mb-2">
                        <div th:each="a : ${topic.attachments}"
                             th:with="ext=${#strings.toLowerCase(#strings.substringAfter(a.url, '.'))}"
                             style="max-width:240px">
                            <a th:if="${ext == 'jpg' or ext == 'jpeg' or ext == 'png' or ext == 'webp' or ext == 'gif'}"
                               th:href="${a.url}" target="_blank">
                                <img th:src="${a.url}" th:alt="${a.originalName}"
                                     style="max-width:240px;max-height:240px;border-radius:6px;">
                            </a>

                            <video th:if="${ext == 'mp4' or ext == 'webm' or ext == 'ogg' or ext == 'mov'}"
                                   controls preload="metadata"
                                   style="max-width:240px;max-height:240px;border-radius:6px;">
                                <source th:src="${a.url}" th:type="${a.mimeType}">
                            </video>

                            <a th:unless="${ext == 'jpg' or ext == 'jpeg' or ext == 'png' or ext == 'webp' or ext == 'gif'
                                          or ext == 'mp4' or ext == 'webm' or ext == 'ogg' or ext == 'mov'}"
                               th:href="${a.url}" target="_blank"
                               class="btn btn-outline-secondary btn-sm"
                               th:text="'📎 ' + ${a.originalName}"></a>
                        </div>
                    </div>

                    <div xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
                         sec:authorize="isAuthenticated()" class="d-flex flex-wrap gap-2 mb-2">
                        <form th:action="@{/bookmarks/topics/{id}/toggle(id=${topic.id})}" method="post" class="m-0">
                            <button type="submit" class="btn btn-sm"
                                    th:classappend="${isBookmarked} ? 'btn-warning' : 'btn-outline-warning'"
                                    th:text="${isBookmarked} ? '🔖 В закладках' : '🔖 В закладки'"></button>
                        </form>
                        <a th:if="${topic.authorId != currentUserId}"
                           th:href="@{/complaints/new(topicId=${topic.id})}"
                           class="btn btn-sm btn-outline-danger">🚩 Пожаловаться</a>
                    </div>

                    <div th:if="${topic.authorId == currentUserId}" class="d-flex flex-wrap gap-2">
                        <a th:href="@{/topics/{id}/edit(id=${topic.id})}"
                           class="btn btn-outline-secondary btn-sm">Редактировать</a>

                        <form th:action="@{/topics/{id}/close(id=${topic.id})}" method="post"
                              th:if="${!topic.isClosed}" class="m-0">
                            <button type="submit" class="btn btn-outline-warning btn-sm">Закрыть тему</button>
                        </form>

                        <form th:action="@{/topics/{id}/open(id=${topic.id})}" method="post"
                              th:if="${topic.isClosed}" class="m-0">
                            <button type="submit" class="btn btn-outline-success btn-sm">Открыть тему</button>
                        </form>

                        <form th:action="@{/topics/{id}/delete(id=${topic.id})}" method="post" class="m-0">
                            <button type="submit" class="btn btn-outline-danger btn-sm"
                                    onclick="return confirm('Удалить тему? Это действие необратимо.')">
                                Удалить тему
                            </button>
                        </form>
                    </div>

                    <div sec:authorize="hasRole('ADMIN')"
                         xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
                         class="d-flex flex-wrap gap-2 mt-2">
                        <form th:unless="${topic.pinnedByAdmin}"
                              th:action="@{/admin/topics/{id}/pin(id=${topic.id})}" method="post" class="m-0">
                            <input type="hidden" name="pinned" value="true">
                            <button type="submit" class="btn btn-warning btn-sm">📌 Закрепить</button>
                        </form>
                        <form th:if="${topic.pinnedByAdmin}"
                              th:action="@{/admin/topics/{id}/pin(id=${topic.id})}" method="post" class="m-0">
                            <input type="hidden" name="pinned" value="false">
                            <button type="submit" class="btn btn-outline-warning btn-sm">Открепить</button>
                        </form>
                    </div>
                </div>
            </div>

            <h2 class="h5 mb-3 text-muted">
                Ответы <span class="badge bg-secondary" th:text="${#lists.size(posts)}">0</span>
            </h2>

            <div th:each="post : ${posts}">
                <div th:replace="~{fragments/post :: postBlock(${post}, ${topic}, ${currentUserId}, 0)}"></div>
            </div>

            <div th:if="${#lists.isEmpty(posts)}" class="text-center text-muted py-4">
                <p>Ответов пока нет. Будьте первым!</p>
            </div>

            <div th:if="${!topic.isClosed}" class="card shadow-sm mt-4">
                <div class="card-header fw-semibold">Написать ответ</div>
                <div class="card-body">
                    <form th:action="@{/posts/topic/{id}(id=${topic.id})}"
                          th:object="${createPostRequest}" method="post" enctype="multipart/form-data">
                        <div class="mb-3">
                            <textarea class="form-control" th:field="*{content}" rows="4"
                                      placeholder="Ваш ответ (необязательно, если есть файлы)"
                                      th:classappend="${#fields.hasErrors('content')} ? 'is-invalid'"></textarea>
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small text-muted">Прикрепить файлы (можно несколько)</label>
                            <input type="file" class="form-control form-control-sm" multiple
                                   name="attachments" accept="image/*,video/*,.pdf,.txt,.zip">
                            <div class="form-text">Картинки, видео, документы — до 50 МБ каждый.</div>
                        </div>
                        <button type="submit" class="btn btn-primary">Отправить ответ</button>
                    </form>
                </div>
            </div>

            <div th:if="${topic.isClosed}" class="alert alert-warning mt-4" role="alert">
                Тема закрыта — новые ответы невозможны.
            </div>

        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
<div th:replace="~{fragments/post :: likeScript}"></div>
<script>
function checkFileSize(input, maxMb) {
    if (input.files[0] && input.files[0].size > maxMb * 1024 * 1024) {
        input.classList.add('is-invalid');
        input.value = '';
    } else {
        input.classList.remove('is-invalid');
    }
}
</script>
</body>
</html>
