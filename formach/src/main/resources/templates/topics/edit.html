<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Редактировать тему')}"></head>
<body>
<div th:replace="~{fragments/layout :: header}"></div>

<main class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="d-flex align-items-center mb-4">
                <a th:href="@{/topics/{id}(id=${topicId})}" class="btn btn-outline-secondary btn-sm me-3">← Назад</a>
                <h1 class="h3 mb-0">Редактировать тему</h1>
            </div>

            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <form th:action="@{/topics/{id}/edit(id=${topicId})}"
                          th:object="${updateRequest}" method="post" enctype="multipart/form-data">

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Заголовок</label>
                            <input type="text" class="form-control" th:field="*{title}"
                                   placeholder="Заголовок темы"
                                   th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'">
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Описание</label>
                            <textarea class="form-control" th:field="*{description}" rows="8"
                                      placeholder="Подробное описание..."
                                      th:classappend="${#fields.hasErrors('description')} ? 'is-invalid'"></textarea>
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Теги</label>
                            <div th:replace="~{fragments/tag-selector :: tagSelector(${allTags}, ${updateRequest.tagIds})}"></div>
                        </div>

                        <div class="mb-3" th:if="${topic != null and topic.attachments != null and !topic.attachments.isEmpty()}">
                            <label class="form-label fw-semibold">Текущие вложения</label>
                            <div class="d-flex flex-wrap gap-2">
                                <div th:each="a : ${topic.attachments}"
                                     class="border rounded p-2" style="max-width:200px">
                                    <div class="small text-truncate mb-1" th:text="${a.originalName}"></div>
                                    <a th:href="${a.url}" target="_blank" class="small">открыть</a>
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox"
                                               name="removeAttachmentIds" th:value="${a.id}">
                                        <label class="form-check-label small text-danger">Удалить</label>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Прикрепить новые файлы
                                <small class="text-muted fw-normal">(можно несколько)</small>
                            </label>
                            <input type="file" class="form-control" name="newAttachments" multiple
                                   accept="image/*,video/*,.pdf,.txt,.zip">
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Сохранить</button>
                            <a th:href="@{/topics/{id}(id=${topicId})}" class="btn btn-outline-secondary">Отмена</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
