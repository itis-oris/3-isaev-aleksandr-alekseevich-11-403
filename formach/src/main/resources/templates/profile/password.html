<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Смена пароля')}"></head>
<body>
<div th:replace="~{fragments/layout :: header}"></div>

<main class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-5">
            <a th:href="@{/profile}" class="btn btn-outline-secondary btn-sm mb-3">← Профиль</a>
            <div class="card shadow-sm">
                <div class="card-header fw-semibold">Смена пароля</div>
                <div class="card-body p-4">

                    <div th:if="${success}" class="alert alert-success">
                        Пароль успешно изменён.
                        <a th:href="@{/profile}">Вернуться в профиль</a>
                    </div>

                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <div th:unless="${(requested != null and requested) or (success != null and success)}">
                        <p>Мы отправим код подтверждения на вашу почту:
                            <strong th:text="${email}"></strong>
                        </p>
                        <form th:action="@{/profile/password/request}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="btn btn-primary">Отправить код</button>
                        </form>
                    </div>

                    <div th:if="${(requested != null and requested) and !(success != null and success)}">
                        <p class="text-muted small">
                            Код отправлен на <strong th:text="${email}"></strong>.
                            Он действителен 15 минут.
                        </p>

                        <form th:action="@{/profile/password/confirm}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                            <div class="mb-3">
                                <label class="form-label">Код из письма</label>
                                <input type="text" name="code" class="form-control"
                                       maxlength="8" autocomplete="one-time-code"
                                       placeholder="6 цифр" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Новый пароль</label>
                                <input type="password" name="newPassword" class="form-control"
                                       autocomplete="new-password"
                                       placeholder="мин. 8 символов, цифра, A-z, a-z" required>
                            </div>

                            <button type="submit" class="btn btn-primary">Сменить пароль</button>
                        </form>

                        <form th:action="@{/profile/password/request}" method="post" class="mt-2">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="btn btn-outline-secondary btn-sm">Прислать новый код</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
