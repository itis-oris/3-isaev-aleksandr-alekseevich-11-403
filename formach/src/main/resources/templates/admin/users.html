<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Пользователи — Админка')}"></head>
<body>
<div th:replace="~{fragments/layout :: header}"></div>

<main class="container py-4">
    <div class="d-flex align-items-center gap-3 mb-4">
        <a th:href="@{/admin}" class="btn btn-outline-secondary btn-sm">← Дашборд</a>
        <h1 class="h3 mb-0">Пользователи</h1>
        <a th:href="@{/admin/complaints}" class="btn btn-outline-secondary btn-sm ms-auto">Жалобы</a>
    </div>

    <form method="get" th:action="@{/admin/users}" class="d-flex gap-2 mb-4">
        <input type="text" name="search" class="form-control" th:value="${search}"
               placeholder="Поиск по логину или email...">
        <button type="submit" class="btn btn-primary">Найти</button>
        <a th:href="@{/admin/users}" class="btn btn-outline-secondary">Сброс</a>
    </form>

    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead class="table-light">
            <tr>
                <th>ID</th>
                <th>Логин</th>
                <th>Имя</th>
                <th>Email</th>
                <th>Роль</th>
                <th>Статус</th>
                <th>Дата рег.</th>
                <th>Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="u : ${users.content}">
                <td class="text-muted small" th:text="${u.id}"></td>
                <td>
                    <a th:href="@{/users/{id}(id=${u.id})}"
                       th:text="${u.login}"
                       class="fw-semibold text-decoration-none"></a>
                </td>
                <td th:text="${u.firstName + ' ' + u.lastName}"></td>
                <td class="text-muted small" th:text="${u.email}"></td>
                <td>
                    <span class="badge"
                          th:classappend="${u.role.name() == 'ADMIN'} ? 'bg-danger' : 'bg-success'"
                          th:text="${u.role.name()}"></span>
                </td>
                <td>
                    <div th:if="${u.isBanned}">
                        <span class="badge bg-warning text-dark">Заблокирован</span>
                        <div class="small text-muted"
                             th:if="${u.bannedUntil != null}"
                             th:text="'до ' + ${#temporals.format(u.bannedUntil, 'dd.MM.yyyy HH:mm')}"></div>
                        <div class="small text-muted"
                             th:if="${u.bannedUntil == null}">бессрочно</div>
                        <div class="small text-truncate" style="max-width:180px"
                             th:if="${u.banReason != null}"
                             th:title="${u.banReason}"
                             th:text="${u.banReason}"></div>
                    </div>
                    <span th:unless="${u.isBanned}" class="text-success small">Активен</span>
                </td>
                <td class="text-muted small"
                    th:text="${u.createdAt != null ? #temporals.format(u.createdAt,'dd.MM.yyyy') : '—'}"></td>
                <td xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
                    <button th:if="${!u.isBanned and
                                    (currentUser.role.name() == 'ADMIN' or u.role.name() == 'USER')}"
                            type="button"
                            class="btn btn-sm btn-outline-danger ban-trigger"
                            th:data-user-id="${u.id}"
                            th:data-user-login="${u.login}">Бан</button>

                    <form th:if="${u.isBanned}"
                          th:action="@{/admin/users/{id}/unban(id=${u.id})}" method="post" class="m-0">
                        <input type="hidden" name="search" th:value="${search}">
                        <input type="hidden" name="page" th:value="${users.number}">
                        <button class="btn btn-sm btn-outline-success">Разбанить</button>
                    </form>

                    <form sec:authorize="hasRole('ADMIN')"
                          th:if="${u.role.name() != 'ADMIN'}"
                          th:action="@{/admin/users/{id}/role(id=${u.id})}" method="post"
                          class="m-0 mt-1 d-flex gap-1">
                        <input type="hidden" name="search" th:value="${search}">
                        <input type="hidden" name="page" th:value="${users.number}">
                        <select name="role" class="form-select form-select-sm">
                            <option value="USER" th:selected="${u.role.name() == 'USER'}">USER</option>
                            <option value="MODERATOR" th:selected="${u.role.name() == 'MODERATOR'}">MODERATOR</option>
                        </select>
                        <button type="submit" class="btn btn-sm btn-outline-primary">→</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="modal fade" id="banModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <form id="banForm" method="post" enctype="multipart/form-data">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" name="search" th:value="${search}">
                <input type="hidden" name="page" th:value="${users.number}">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Блокировка пользователя
                            <span class="text-muted" id="banUserLogin"></span>
                        </h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Причина <span class="text-muted small">(увидит пользователь)</span></label>
                            <textarea name="reason" class="form-control" rows="3" required
                                      placeholder="Например: спам, оскорбления..."></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Срок бана</label>
                            <select class="form-select mb-2" id="banDurationPreset">
                                <option value="60">1 час</option>
                                <option value="1440">1 день</option>
                                <option value="10080" selected>7 дней</option>
                                <option value="43200">30 дней</option>
                                <option value="custom">Указать вручную</option>
                                <option value="">Бессрочно</option>
                            </select>
                            <input type="datetime-local" name="bannedUntil" id="banUntilInput"
                                   class="form-control" style="display:none">
                            <div class="form-text">Когда срок истечёт — бан снимется автоматически при попытке входа.</div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Пруфы (опционально)
                                <span class="text-muted small">— скриншоты, документы</span>
                            </label>
                            <input type="file" name="proofs" class="form-control" multiple
                                   accept="image/*,video/*,application/pdf">
                            <div class="form-text">Пользователь увидит эти файлы на экране бана при попытке входа.</div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                        <button type="submit" class="btn btn-danger">Заблокировать</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <nav th:if="${users.totalPages > 1}" aria-label="Пагинация">
        <ul class="pagination justify-content-center">
            <li th:each="i : ${#numbers.sequence(0, users.totalPages - 1)}"
                class="page-item" th:classappend="${i == users.number} ? 'active'">
                <a class="page-link"
                   th:href="@{/admin/users(search=${search},page=${i})}"
                   th:text="${i + 1}"></a>
            </li>
        </ul>
    </nav>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
<script th:inline="javascript">
(function () {
    const modalEl = document.getElementById('banModal');
    const form = document.getElementById('banForm');
    const loginLabel = document.getElementById('banUserLogin');
    const preset = document.getElementById('banDurationPreset');
    const untilInput = document.getElementById('banUntilInput');
    const modal = new bootstrap.Modal(modalEl);

    document.querySelectorAll('.ban-trigger').forEach(function (btn) {
        btn.addEventListener('click', function () {
            const userId = btn.dataset.userId;
            const login = btn.dataset.userLogin;
            form.action = '/admin/users/' + encodeURIComponent(userId) + '/ban';
            loginLabel.textContent = login ? '@' + login : '';
            preset.value = '10080';
            untilInput.style.display = 'none';
            untilInput.value = computeUntil(10080);
            modal.show();
        });
    });

    preset.addEventListener('change', function () {
        const v = preset.value;
        if (v === 'custom') {
            untilInput.style.display = '';
            untilInput.value = computeUntil(60);
        } else if (v === '') {
            untilInput.style.display = 'none';
            untilInput.value = '';
        } else {
            untilInput.style.display = 'none';
            untilInput.value = computeUntil(parseInt(v, 10));
        }
    });

    function computeUntil(minutes) {
        const d = new Date(Date.now() + minutes * 60000);
        const pad = n => String(n).padStart(2, '0');
        return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate())
                + 'T' + pad(d.getHours()) + ':' + pad(d.getMinutes());
    }
})();
</script>
</body>
</html>
