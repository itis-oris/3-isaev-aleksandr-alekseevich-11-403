<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Ошибка')}"></head>
<body>
<div th:replace="~{fragments/layout :: header}"></div>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="display-1 text-danger mb-3">&#9888;</div>
            <h1 class="h3 mb-3">Упс! Что-то пошло не так</h1>
            <p class="text-muted mb-4" th:text="${message}">Произошла непредвиденная ошибка</p>
            <div class="d-flex justify-content-center gap-3">
                <button onclick="history.back()" class="btn btn-outline-secondary">&#8592; Назад</button>
                <a th:href="@{/topics}" class="btn btn-primary">К темам форума</a>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
