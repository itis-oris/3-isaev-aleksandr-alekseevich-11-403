<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Уведомления')}"></head>
<body>
<div th:replace="~{fragments/layout :: header}"></div>

<main class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <h1 class="h4 mb-3">🔔 Уведомления</h1>

            <p th:if="${notifications.totalElements == 0}" class="text-muted text-center py-4">
                Пока ничего нового.
            </p>

            <div class="list-group">
                <a th:each="n : ${notifications.content}"
                   th:href="${n.link != null ? n.link : '#'}"
                   class="list-group-item list-group-item-action"
                   th:classappend="${!n.isRead} ? 'list-group-item-light' : ''">
                    <div class="d-flex justify-content-between">
                        <div>
                            <span th:if="${!n.isRead}" class="badge bg-primary me-1">новое</span>
                            <span th:text="${n.message}">message</span>
                        </div>
                        <small class="text-muted"
                               th:text="${#temporals.format(n.createdAt, 'dd.MM HH:mm')}"></small>
                    </div>
                </a>
            </div>

            <nav th:if="${notifications.totalPages > 1}" class="mt-3">
                <ul class="pagination justify-content-center">
                    <li th:each="i : ${#numbers.sequence(0, notifications.totalPages - 1)}"
                        class="page-item" th:classappend="${i == notifications.number} ? 'active'">
                        <a class="page-link" th:href="@{/notifications(page=${i})}"
                           th:text="${i + 1}"></a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
