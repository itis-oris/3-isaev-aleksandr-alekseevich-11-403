<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Ошибка подтверждения')}"></head>
<body>
<div th:replace="~{fragments/layout :: header}"></div>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="display-1 text-danger mb-3">&#10007;</div>
            <h1 class="h3 mb-3">Не удалось подтвердить email</h1>
            <p class="text-muted mb-4" th:text="${error}"></p>
            <a th:href="@{/auth/register}" class="btn btn-primary">Зарегистрироваться заново</a>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
