<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Регистрация')}"></head>
<body class="bg-light">

<div th:replace="~{fragments/layout :: header}"></div>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-sm-10 col-md-7 col-lg-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h2 class="card-title text-center mb-4">Регистрация</h2>

                    <form th:action="@{/auth/register}" th:object="${registerRequest}" method="post">
                        <div class="mb-3">
                            <label for="login" class="form-label">Логин</label>
                            <input type="text" id="login" class="form-control"
                                   th:field="*{login}" placeholder="Логин"
                                   th:classappend="${#fields.hasErrors('login')} ? 'is-invalid'">
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('login')}" th:errors="*{login}"></div>
                            <div class="text-danger small mt-1 ajax-error" data-field="login"></div>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" id="email" class="form-control"
                                   th:field="*{email}" placeholder="Email"
                                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                            <div class="text-danger small mt-1 ajax-error" data-field="email"></div>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Пароль</label>
                            <input type="password" id="password" class="form-control"
                                   th:field="*{password}" placeholder="Минимум 8 символов"
                                   th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'">
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                            <div class="text-danger small mt-1 ajax-error" data-field="password"></div>
                        </div>

                        <div class="row">
                            <div class="col mb-3">
                                <label class="form-label">Имя</label>
                                <input type="text" class="form-control"
                                       th:field="*{firstName}" placeholder="Имя"
                                       th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid'">
                                <div class="invalid-feedback"
                                     th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></div>
                            </div>
                            <div class="col mb-3">
                                <label class="form-label">Фамилия</label>
                                <input type="text" class="form-control"
                                       th:field="*{lastName}" placeholder="Фамилия"
                                       th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid'">
                                <div class="invalid-feedback"
                                     th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Пол</label>
                            <select class="form-select" th:field="*{gender}"
                                    th:classappend="${#fields.hasErrors('gender')} ? 'is-invalid'">
                                <option value="">Выберите пол</option>
                                <option value="MALE">Мужчина</option>
                                <option value="FEMALE">Женщина</option>
                            </select>
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('gender')}" th:errors="*{gender}"></div>
                        </div>

                        <div class="d-grid mb-3">
                            <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
                        </div>
                    </form>

                    <hr>
                    <div class="text-center">
                        <small>Уже есть аккаунт?
                            <a th:href="@{/login}">Войти</a>
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
<script src="/js/register.js"></script>
</body>
</html>
