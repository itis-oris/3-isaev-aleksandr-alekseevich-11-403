<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Доступ запрещён')}"></head>
<body>
<div th:replace="~{fragments/layout :: header}"></div>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="display-1 fw-bold text-danger mb-2">403</div>
            <h1 class="h3 mb-3">Доступ запрещён</h1>
            <p class="text-muted mb-4" th:text="${message}">У вас нет прав для этого действия</p>
            <div class="d-flex justify-content-center gap-3">
                <button onclick="history.back()" class="btn btn-outline-secondary">Назад</button>
                <a th:href="@{/topics}" class="btn btn-primary">К темам форума</a>
                <a th:href="@{/}" class="btn btn-outline-secondary">На главную</a>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
