<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Проверьте почту')}"></head>
<body>
<div th:replace="~{fragments/layout :: header}"></div>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="display-1 text-success mb-3">&#10003;</div>
            <h1 class="h3 mb-3">Регистрация почти завершена!</h1>
            <p class="text-muted mb-2">
                Мы отправили письмо на вашу почту.
                Перейдите по ссылке в письме, чтобы подтвердить аккаунт.
            </p>
            <p class="text-muted mb-4">Ссылка действительна 24 часа.</p>
            <a th:href="@{/login}" class="btn btn-primary">Перейти к входу</a>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
